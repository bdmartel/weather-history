<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather History</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111; color: #e0e0e0;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      line-height: 1.5; padding: 16px; max-width: 900px; margin: 0 auto;
    }
    .data, code, table { font-family: 'JetBrains Mono', 'SF Mono', monospace; }
    h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.02em; }
    h3 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 8px; }
    .hidden { display: none !important; }

    header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .loc-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 0.8rem; }
    .loc-btn:hover { color: #4fc3f7; }
    #loc-search { width: 100%; position: relative; }
    #loc-input {
      width: 100%; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333;
      border-radius: 6px; padding: 8px 12px; font-size: 0.9rem; outline: none;
    }
    #loc-input:focus { border-color: #4fc3f7; }
    #loc-results {
      position: absolute; top: 100%; left: 0; right: 0; background: #1a1a1a;
      border: 1px solid #333; border-top: none; border-radius: 0 0 6px 6px;
      max-height: 200px; overflow-y: auto; z-index: 10;
    }
    .loc-item { padding: 8px 12px; cursor: pointer; font-size: 0.85rem; }
    .loc-item:hover { background: #2a2a2a; }

    /* Button rows */
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .btn-row label { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 0.04em; margin-right: 6px; align-self: center; }
    .pbtn, .ybtn {
      background: #1a1a1a; color: #777; border: 1px solid #2a2a2a; border-radius: 6px;
      padding: 7px 16px; font-size: 0.82rem; cursor: pointer; transition: all 0.15s;
      font-weight: 500;
    }
    .pbtn:hover, .ybtn:hover { border-color: #555; color: #ccc; }
    .pbtn.active { background: #4fc3f7; color: #111; border-color: #4fc3f7; font-weight: 600; }

    .ybtn.active.y0 { background: rgba(79,195,247,0.18); color: #4fc3f7; border-color: #4fc3f7; }
    .ybtn.active.y1 { background: rgba(255,183,77,0.18); color: #ffb74d; border-color: #ffb74d; }
    .ybtn.active.y2 { background: rgba(102,187,106,0.18); color: #66bb6a; border-color: #66bb6a; }
    .ybtn.active.y3 { background: rgba(206,147,216,0.18); color: #ce93d8; border-color: #ce93d8; }
    .ybtn.active.y4 { background: rgba(239,83,80,0.18); color: #ef5350; border-color: #ef5350; }

    /* Loading / Error */
    #loading { text-align: center; padding: 32px; color: #888; font-size: 0.9rem; }
    .spinner {
      width: 20px; height: 20px; border: 3px solid #333; border-top-color: #4fc3f7;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { background: #2a1a1a; border: 1px solid #ef5350; border-radius: 8px; padding: 10px 14px; color: #ef5350; font-size: 0.85rem; margin-bottom: 12px; }

    /* Summary cards */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 20px; }
    .card { background: #1a1a1a; border: 1px solid #222; border-radius: 8px; padding: 10px 12px; }
    .card-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 6px; }
    .card-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
    .card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
    .card-val { font-size: 1.2rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .card-val.solo { font-size: 1.5rem; color: #e0e0e0; }

    /* Charts */
    .chart-section { margin-bottom: 20px; }
    .chart-wrap { position: relative; height: 240px; background: #1a1a1a; border-radius: 8px; padding: 6px; }

    /* Table */
    .table-section { margin-bottom: 20px; }
    .table-section summary {
      cursor: pointer; font-size: 0.8rem; color: #666; padding: 8px 0;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .table-section summary:hover { color: #4fc3f7; }
    .tbl-label { font-size: 0.8rem; margin: 12px 0 4px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 0.78rem; margin-bottom: 10px; }
    th { text-align: left; padding: 5px 7px; border-bottom: 2px solid #333; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em; color: #888; }
    td { padding: 4px 7px; border-bottom: 1px solid #1e1e1e; }
    tr:hover td { background: #181818; }
    .wx-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 0.68rem; background: #1e1e1e; }

    footer { text-align: center; padding: 24px; color: #444; font-size: 0.72rem; }
    footer a { color: #4fc3f7; text-decoration: none; }

    @media (max-width: 600px) {
      body { padding: 10px; }
      .card-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-wrap { height: 200px; }
      th, td { padding: 3px 4px; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>Weather History</h1>
    <div>
      <span id="loc-name" style="color:#ccc;font-size:0.9rem"></span>
      <button class="loc-btn" onclick="toggleLoc()">[change]</button>
    </div>
    <div id="loc-search" class="hidden">
      <input type="text" id="loc-input" placeholder="Search city..." oninput="debounceGeo()" onkeydown="if(event.key==='Escape')toggleLoc()">
      <div id="loc-results"></div>
    </div>
  </header>

  <div class="btn-row" id="periods">
    <label>Period</label>
    <button class="pbtn active" onclick="setPeriod(7)">7 Days</button>
    <button class="pbtn" onclick="setPeriod(10)">10 Days</button>
    <button class="pbtn" onclick="setPeriod(20)">20 Days</button>
    <button class="pbtn" onclick="setPeriod(30)">30 Days</button>
  </div>

  <div class="btn-row" id="years"></div>

  <div id="loading" class="hidden"><span class="spinner"></span> Loading...</div>
  <div id="error" class="hidden"></div>

  <div id="results" class="hidden">
    <div class="card-grid" id="summary"></div>
    <div class="chart-section"><h3>Temperature</h3><div class="chart-wrap"><canvas id="cTemp"></canvas></div></div>
    <div class="chart-section"><h3>Precipitation</h3><div class="chart-wrap"><canvas id="cPrecip"></canvas></div></div>
    <div class="chart-section"><h3>Humidity</h3><div class="chart-wrap"><canvas id="cHumid"></canvas></div></div>
    <details class="table-section"><summary>Daily Data</summary><div id="tables"></div></details>
  </div>
</div>
<footer>Data from <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo.com</a></footer>

<script>
// ─── Config ───
const ARCHIVE = 'https://archive-api.open-meteo.com/v1/archive';
const FORECAST = 'https://api.open-meteo.com/v1/forecast';
const GEOCODE  = 'https://geocoding-api.open-meteo.com/v1/search';
const DAILY    = 'temperature_2m_max,temperature_2m_min,precipitation_sum,rain_sum,snowfall_sum,precipitation_hours,weather_code';
const HOURLY   = 'relative_humidity_2m';

const NOW = new Date();
const THIS_YEAR = NOW.getFullYear();
const YEARS = [THIS_YEAR, THIS_YEAR-1, THIS_YEAR-2, THIS_YEAR-3, THIS_YEAR-4];

const C = [
  { m:'#4fc3f7', f:'rgba(79,195,247,0.10)',  d:'#0288d1' },
  { m:'#ffb74d', f:'rgba(255,183,77,0.10)',   d:'#f57c00' },
  { m:'#66bb6a', f:'rgba(102,187,106,0.10)',  d:'#388e3c' },
  { m:'#ce93d8', f:'rgba(206,147,216,0.10)',  d:'#8e24aa' },
  { m:'#ef5350', f:'rgba(239,83,80,0.10)',    d:'#c62828' },
];

const WX = {
  0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Fog',48:'Rime Fog',
  51:'Lt Drizzle',53:'Drizzle',55:'Hvy Drizzle',56:'Frz Drizzle',57:'Hvy Frz Drizzle',
  61:'Lt Rain',63:'Rain',65:'Hvy Rain',66:'Frz Rain',67:'Hvy Frz Rain',
  71:'Lt Snow',73:'Snow',75:'Hvy Snow',77:'Snow Grains',
  80:'Lt Showers',81:'Showers',82:'Hvy Showers',85:'Lt Snow Shwrs',86:'Hvy Snow Shwrs',
  95:'Thunderstorm',96:'T-Storm+Hail',99:'Hvy T-Storm+Hail'
};
function wxColor(c) {
  if (c<=0) return '#ffd54f'; if (c<=3) return '#bdbdbd'; if (c<=48) return '#78909c';
  if (c<=67) return '#29b6f6'; if (c<=77) return '#e0e0e0'; if (c<=82) return '#29b6f6';
  return '#ff8a65';
}

// ─── State ───
let loc = JSON.parse(localStorage.getItem('wx-loc')) || { name:'Wilton, NH', lat:42.8406, lon:-71.7356 };
let period = 7;
let activeYears = new Set([THIS_YEAR]);
let yearData = {};
let cTemp=null, cPrecip=null, cHumid=null;
let geoTimer=null, refreshTimer=null;
const cache = {};

// ─── Init ───
document.getElementById('loc-name').textContent = loc.name;
renderYearBtns();
refresh();

// ─── API ───
function fmt(d) { return d.toISOString().split('T')[0]; }

function process(raw) {
  const dl = raw.daily;
  const hum = [];
  if (raw.hourly?.relative_humidity_2m) {
    const ht=raw.hourly.time, hh=raw.hourly.relative_humidity_2m, byD={};
    ht.forEach((t,i)=>{ const d=t.split('T')[0]; (byD[d]=byD[d]||[]).push(hh[i]); });
    dl.time.forEach(d=>{ const v=(byD[d]||[]).filter(x=>x!=null); hum.push(v.length?Math.round(v.reduce((a,b)=>a+b)/v.length):null); });
  }
  return {
    dates:dl.time, high:dl.temperature_2m_max, low:dl.temperature_2m_min,
    precip:dl.precipitation_sum, rain:dl.rain_sum,
    snow:dl.snowfall_sum?.map(v=>v!=null?+(v/2.54).toFixed(2):null),
    precipHrs:dl.precipitation_hours, wxCode:dl.weather_code, humidity:hum
  };
}

async function fetchWx(start, end) {
  const key = `${loc.lat},${loc.lon},${start},${end}`;
  if (cache[key]) return cache[key];
  const qs = new URLSearchParams({
    latitude:loc.lat, longitude:loc.lon, start_date:start, end_date:end,
    daily:DAILY, hourly:HOURLY, timezone:'auto',
    temperature_unit:'fahrenheit', precipitation_unit:'inch'
  }).toString();

  // Try forecast for recent, archive for older
  const endDaysAgo = Math.floor((NOW - new Date(end+'T12:00:00')) / 86400000);
  if (endDaysAgo < 7) {
    try {
      const r = await fetch(`${FORECAST}?${qs}`);
      if (r.ok) { const d=await r.json(); if(d.daily?.time?.length){ cache[key]=process(d); return cache[key]; } }
    } catch(_){}
  }
  const r = await fetch(`${ARCHIVE}?${qs}`);
  if (!r.ok) throw new Error('API error');
  const d = await r.json();
  if (!d.daily?.time?.length) throw new Error('No data');
  cache[key] = process(d);
  return cache[key];
}

// ─── Core refresh ───
async function refresh() {
  if (!activeYears.size) { hideResults(); return; }
  showLoading(true); hideError();

  // Compute base date window (ending yesterday)
  const baseEnd = new Date(NOW); baseEnd.setDate(baseEnd.getDate()-1);
  const baseStart = new Date(baseEnd); baseStart.setDate(baseStart.getDate()-period+1);
  const sm=baseStart.getMonth(), sd=baseStart.getDate(), em=baseEnd.getMonth(), ed=baseEnd.getDate();

  try {
    const sorted = [...activeYears].sort((a,b)=>b-a);
    const results = await Promise.all(sorted.map(yr => {
      const offset = THIS_YEAR - yr;
      const s = new Date(baseStart); s.setFullYear(s.getFullYear()-offset);
      const e = new Date(baseEnd);   e.setFullYear(e.getFullYear()-offset);
      return fetchWx(fmt(s), fmt(e)).then(data=>({yr,data}));
    }));
    yearData = {};
    results.forEach(r => yearData[r.yr] = r.data);
    renderAll();
    showLoading(false); showResults();
  } catch(e) {
    showLoading(false); showError(e.message);
  }
}

function scheduleRefresh() { clearTimeout(refreshTimer); refreshTimer = setTimeout(refresh, 150); }

// ─── Controls ───
function setPeriod(n) {
  period = n;
  document.querySelectorAll('.pbtn').forEach(b => b.classList.toggle('active', parseInt(b.textContent)===n));
  scheduleRefresh();
}

function toggleYear(yr) {
  if (activeYears.has(yr)) { if (activeYears.size > 1) activeYears.delete(yr); }
  else activeYears.add(yr);
  renderYearBtns();
  scheduleRefresh();
}

function renderYearBtns() {
  const el = document.getElementById('years');
  el.innerHTML = '<label>Years</label>' + YEARS.map((yr,i) =>
    `<button class="ybtn y${i}${activeYears.has(yr)?' active':''}" onclick="toggleYear(${yr})">${yr}</button>`
  ).join('');
}

// Location
function toggleLoc() {
  const el=document.getElementById('loc-search'); el.classList.toggle('hidden');
  if(!el.classList.contains('hidden')) document.getElementById('loc-input').focus();
}
function debounceGeo() {
  clearTimeout(geoTimer);
  geoTimer = setTimeout(async()=>{
    const q=document.getElementById('loc-input').value.trim();
    if(q.length<2){document.getElementById('loc-results').innerHTML='';return;}
    const r=await fetch(`${GEOCODE}?name=${encodeURIComponent(q)}&count=5&language=en&format=json`);
    const d=await r.json(); window._gr=d.results||[];
    document.getElementById('loc-results').innerHTML=window._gr.map((r,i)=>
      `<div class="loc-item" onclick="pickLoc(${i})">${r.name}, ${r.admin1||''} ${r.country||''}</div>`
    ).join('');
  },300);
}
function pickLoc(i) {
  const r=window._gr[i];
  loc={name:`${r.name}, ${r.admin1||r.country||''}`.replace(/,\s*$/,''),lat:r.latitude,lon:r.longitude};
  localStorage.setItem('wx-loc',JSON.stringify(loc));
  document.getElementById('loc-name').textContent=loc.name;
  document.getElementById('loc-search').classList.add('hidden');
  document.getElementById('loc-results').innerHTML='';
  document.getElementById('loc-input').value='';
  Object.keys(cache).forEach(k=>delete cache[k]);
  refresh();
}

// ─── UI helpers ───
function showLoading(v){document.getElementById('loading').classList.toggle('hidden',!v);}
function showResults(){document.getElementById('results').classList.remove('hidden');}
function hideResults(){document.getElementById('results').classList.add('hidden');}
function showError(m){const e=document.getElementById('error');e.textContent=m;e.classList.remove('hidden');}
function hideError(){document.getElementById('error').classList.add('hidden');}

function formatDate(s){const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function avg(a){const v=a.filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b)/v.length:null;}
function sum(a){const v=a.filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b):null;}
function cntNZ(a){return a.filter(x=>x!=null&&x>0).length;}

// ─── Render all ───
function renderAll() {
  const sorted = [...activeYears].sort((a,b)=>b-a);
  renderSummary(sorted);
  renderCharts(sorted);
  renderTables(sorted);
}

function renderSummary(sorted) {
  const multi = sorted.length > 1;
  const stats = [
    {t:'Avg High',  k:'high',     fn:avg,  u:'\u00b0F', dec:1},
    {t:'Avg Low',   k:'low',      fn:avg,  u:'\u00b0F', dec:1},
    {t:'Total Precip', k:'precip',fn:sum,  u:'"',       dec:2},
    {t:'Rain Days', k:'rain',     fn:cntNZ,u:'',        dec:0},
    {t:'Snow Days', k:'snow',     fn:cntNZ,u:'',        dec:0},
    {t:'Avg Humidity',k:'humidity',fn:avg, u:'%',       dec:0},
  ];
  document.getElementById('summary').innerHTML = stats.map(s => {
    const rows = sorted.map(yr => {
      const d = yearData[yr]; if(!d) return null;
      const v = s.fn(d[s.k]);
      const str = v!=null ? (s.dec?v.toFixed(s.dec):Math.round(v))+s.u : '--';
      const ci = YEARS.indexOf(yr);
      return {yr, str, ci};
    }).filter(Boolean);
    if (!multi && rows.length===1) {
      return `<div class="card"><div class="card-title">${s.t}</div><div class="card-val solo">${rows[0].str}</div></div>`;
    }
    const inner = rows.map(r =>
      `<div class="card-row"><span class="card-dot" style="background:${C[r.ci].m}"></span><span class="card-val" style="color:${C[r.ci].m}">${r.str}</span><span style="color:#555;font-size:0.7rem;margin-left:4px">${r.yr}</span></div>`
    ).join('');
    return `<div class="card"><div class="card-title">${s.t}</div>${inner}</div>`;
  }).join('');
}

// ─── Charts ───
function destroyCharts(){[cTemp,cPrecip,cHumid].forEach(c=>{if(c)c.destroy()});cTemp=cPrecip=cHumid=null;}

function xLabels() {
  const ref = yearData[Object.keys(yearData)[0]];
  if(!ref) return [];
  return ref.dates.map(d=>{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});});
}

function darkOpts(yLabel) {
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{labels:{color:'#aaa',boxWidth:10,font:{size:10}}},
      tooltip:{backgroundColor:'#1a1a1a',titleColor:'#e0e0e0',bodyColor:'#ccc',borderColor:'#333',borderWidth:1}
    },
    scales:{
      x:{ticks:{color:'#666',font:{size:10},maxRotation:45},grid:{color:'#1e1e1e'}},
      y:{ticks:{color:'#666',font:{size:10}},grid:{color:'#1e1e1e'},
         title:{display:!!yLabel,text:yLabel,color:'#666',font:{size:10}}}
    }
  };
}

function renderCharts(sorted) {
  destroyCharts();
  const labels = xLabels();

  // Temperature: solid high, dashed low per year
  const tempDS = [];
  sorted.forEach(yr => {
    const ci = YEARS.indexOf(yr); const d = yearData[yr]; if(!d) return;
    tempDS.push(
      {label:`${yr} High`,data:d.high,borderColor:C[ci].m,borderWidth:2,pointRadius:1.5,tension:0.3,fill:false},
      {label:`${yr} Low`, data:d.low, borderColor:C[ci].d,borderWidth:1.5,pointRadius:1.5,tension:0.3,borderDash:[4,3],fill:false}
    );
  });
  cTemp = new Chart(document.getElementById('cTemp'),{type:'line',data:{labels,datasets:tempDS},options:darkOpts('\u00b0F')});

  // Precipitation: grouped bars
  const precipDS = sorted.map(yr => {
    const ci=YEARS.indexOf(yr); const d=yearData[yr]; if(!d) return null;
    return {label:`${yr}`,data:d.precip,backgroundColor:C[ci].m+'99',borderColor:C[ci].m,borderWidth:1,borderRadius:2};
  }).filter(Boolean);
  cPrecip = new Chart(document.getElementById('cPrecip'),{type:'bar',data:{labels,datasets:precipDS},options:darkOpts('inches')});

  // Humidity: lines
  const humDS = sorted.map(yr => {
    const ci=YEARS.indexOf(yr); const d=yearData[yr]; if(!d) return null;
    return {label:`${yr}`,data:d.humidity,borderColor:C[ci].m,borderWidth:2,pointRadius:1.5,tension:0.3,fill:false};
  }).filter(Boolean);
  const hOpts = darkOpts('%');
  hOpts.scales.y.min=0; hOpts.scales.y.max=100;
  cHumid = new Chart(document.getElementById('cHumid'),{type:'line',data:{labels,datasets:humDS},options:hOpts});
}

// ─── Tables ───
function renderTables(sorted) {
  document.getElementById('tables').innerHTML = sorted.map(yr => {
    const ci=YEARS.indexOf(yr); const d=yearData[yr]; if(!d) return '';
    const hasSnow = d.snow.some(v=>v!=null&&v>0);
    let h = `<div class="tbl-label" style="color:${C[ci].m}">${yr}</div><table><thead><tr>`;
    h += '<th>Date</th><th>Cond</th><th>Hi</th><th>Lo</th><th>Precip</th>';
    if(hasSnow) h+='<th>Snow</th>';
    h += '<th>Hum</th></tr></thead><tbody>';
    d.dates.forEach((_,i)=>{
      const wx=WX[d.wxCode[i]]||'--', wc=wxColor(d.wxCode[i]);
      h+=`<tr><td>${formatDate(d.dates[i])}</td><td><span class="wx-badge" style="color:${wc}">${wx}</span></td>`;
      h+=`<td class="data">${d.high[i]!=null?d.high[i].toFixed(1)+'\u00b0':'--'}</td>`;
      h+=`<td class="data">${d.low[i]!=null?d.low[i].toFixed(1)+'\u00b0':'--'}</td>`;
      h+=`<td class="data">${d.precip[i]!=null?d.precip[i].toFixed(2)+'"':'--'}</td>`;
      if(hasSnow) h+=`<td class="data">${d.snow[i]>0?d.snow[i].toFixed(1)+'"':'--'}</td>`;
      h+=`<td class="data">${d.humidity[i]!=null?d.humidity[i]+'%':'--'}</td></tr>`;
    });
    h+='</tbody></table>';
    return h;
  }).join('');
}
</script>
</body>
</html>
