<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather History</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff; color: #222;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 9pt; line-height: 1.45;
      padding: 16px; max-width: 880px; margin: 0 auto;
    }
    .hidden { display: none !important; }

    /* Header */
    header {
      display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px;
      border-bottom: 2px solid #222; padding-bottom: 8px; flex-wrap: wrap;
    }
    h1 { font-size: 13pt; font-weight: 700; letter-spacing: -0.02em; text-transform: uppercase; }
    .loc-name { font-size: 9pt; color: #555; }
    .loc-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 8pt; text-decoration: underline; }
    .loc-btn:hover { color: #0277bd; }
    #loc-search { width: 100%; position: relative; }
    #loc-input {
      width: 100%; background: #fff; color: #222; border: 1px solid #ccc;
      padding: 5px 8px; font-size: 9pt; outline: none;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    #loc-input:focus { border-color: #0277bd; }
    #loc-results {
      position: absolute; top: 100%; left: 0; right: 0; background: #fff;
      border: 1px solid #ccc; border-top: none; max-height: 180px; overflow-y: auto; z-index: 10;
    }
    .loc-item { padding: 5px 8px; cursor: pointer; font-size: 8.5pt; }
    .loc-item:hover { background: #f0f0f0; }

    /* Controls */
    .ctrl-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
    .ctrl-row .lbl {
      font-size: 7pt; color: #999; text-transform: uppercase; letter-spacing: 0.08em;
      font-weight: 700; margin-right: 4px; align-self: center;
    }
    .pbtn, .ybtn {
      background: #fff; color: #555; border: 1px solid #ccc;
      padding: 4px 12px; font-size: 8pt; cursor: pointer;
      font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500;
      transition: all 0.1s;
    }
    .pbtn:hover, .ybtn:hover { border-color: #888; color: #222; }
    .pbtn.active {
      background: #222; color: #fff; border-color: #222; font-weight: 700;
    }
    .ybtn.active { font-weight: 700; }

    /* Loading / Error */
    #loading { text-align: center; padding: 24px; color: #888; font-size: 9pt; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #0277bd;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      display: inline-block; vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error { background: #fff5f5; border: 1px solid #c62828; padding: 6px 10px; color: #c62828; font-size: 8.5pt; margin-bottom: 10px; }

    /* Summary table */
    .summary-tbl { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 8.5pt; }
    .summary-tbl th {
      background: #222; color: #fff; text-transform: uppercase; font-size: 7pt;
      letter-spacing: 0.06em; font-weight: 700; padding: 5px 8px; text-align: right;
    }
    .summary-tbl th:first-child { text-align: left; }
    .summary-tbl td {
      padding: 4px 8px; text-align: right; font-weight: 600;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }
    .summary-tbl td:first-child { text-align: left; font-weight: 700; }
    .summary-tbl tr:nth-child(even) td { background: #f5f5f5; }
    .summary-tbl .yr-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      margin-right: 5px; vertical-align: middle;
    }

    /* Section headers */
    .sec-hdr {
      font-size: 8pt; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #222; margin: 14px 0 6px;
      border-bottom: 1px solid #ddd; padding-bottom: 3px;
    }

    /* Charts */
    .chart-wrap { position: relative; height: 220px; margin-bottom: 16px; }

    /* Data tables */
    .table-section { margin-bottom: 16px; }
    .table-section summary {
      cursor: pointer; font-size: 8pt; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #222; padding: 6px 0;
      border-bottom: 1px solid #ddd;
    }
    .table-section summary:hover { color: #0277bd; }
    .tbl-yr {
      font-size: 8pt; font-weight: 700; margin: 10px 0 3px;
      padding: 3px 8px; display: inline-block;
    }
    table.daily { width: 100%; border-collapse: collapse; font-size: 8pt; margin-bottom: 8px; }
    table.daily th {
      background: #222; color: #fff; text-transform: uppercase; font-size: 6.5pt;
      letter-spacing: 0.06em; font-weight: 700; padding: 4px 6px; text-align: left;
    }
    table.daily td { padding: 3px 6px; }
    table.daily tbody tr:nth-child(even) td { background: #f5f5f5; }
    table.daily tbody tr:hover td { background: #e8f4e8; }
    .freeze, td.freeze { color: #0277bd; font-weight: 700; }
    .frost-tag { font-size: 6pt; font-weight: 700; color: #0277bd; text-transform: uppercase; margin-left: 3px; }
    .wx-tag { font-size: 7pt; font-weight: 600; }
    .num { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 500; }

    footer { text-align: center; padding: 16px; color: #aaa; font-size: 7pt; border-top: 1px solid #eee; margin-top: 12px; }
    footer a { color: #0277bd; text-decoration: none; }

    @media (max-width: 600px) {
      body { padding: 8px; }
      .chart-wrap { height: 180px; }
      .summary-tbl { font-size: 8pt; }
      table.daily { font-size: 7.5pt; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <h1>Weather History</h1>
    <div>
      <span class="loc-name" id="loc-name"></span>
      <button class="loc-btn" onclick="toggleLoc()">change</button>
    </div>
    <div id="loc-search" class="hidden">
      <input type="text" id="loc-input" placeholder="Search city..." oninput="debounceGeo()" onkeydown="if(event.key==='Escape')toggleLoc()">
      <div id="loc-results"></div>
    </div>
  </header>

  <div class="ctrl-row" id="periods">
    <span class="lbl">Period</span>
    <button class="pbtn active" onclick="setPeriod(7)">7 Days</button>
    <button class="pbtn" onclick="setPeriod(10)">10 Days</button>
    <button class="pbtn" onclick="setPeriod(20)">20 Days</button>
    <button class="pbtn" onclick="setPeriod(30)">30 Days</button>
    <button class="pbtn" onclick="setPeriod(60)">60 Days</button>
    <button class="pbtn" onclick="setPeriod(120)">120 Days</button>
    <button class="pbtn" onclick="setPeriod(180)">180 Days</button>
    <button class="pbtn" onclick="setPeriod(365)">1 Year</button>
  </div>
  <div class="ctrl-row" id="years"></div>

  <div id="loading" class="hidden"><span class="spinner"></span> Loading...</div>
  <div id="error" class="hidden"></div>

  <div id="results" class="hidden">
    <div id="summary"></div>
    <div class="sec-hdr">Temperature</div>
    <div class="chart-wrap"><canvas id="cTemp"></canvas></div>
    <div class="sec-hdr">Precipitation</div>
    <div class="chart-wrap"><canvas id="cPrecip"></canvas></div>
    <div class="sec-hdr">Humidity</div>
    <div class="chart-wrap"><canvas id="cHumid"></canvas></div>
    <div class="sec-hdr">Daily Data</div>
    <div id="tables"></div>
  </div>
</div>
<footer>Data from <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo.com</a></footer>

<script>
// ─── Config ───
const ARCHIVE = 'https://archive-api.open-meteo.com/v1/archive';
const FORECAST = 'https://api.open-meteo.com/v1/forecast';
const GEOCODE  = 'https://geocoding-api.open-meteo.com/v1/search';
const DAILY    = 'temperature_2m_max,temperature_2m_min,precipitation_sum,rain_sum,snowfall_sum,precipitation_hours,weather_code';
const HOURLY   = 'relative_humidity_2m';

const NOW = new Date();
const THIS_YEAR = NOW.getFullYear();
const YEARS = Array.from({length: THIS_YEAR - 2015 + 1}, (_, i) => THIS_YEAR - i);

const C = [
  { m:'#0277bd', d:'#01579b' },
  { m:'#e65100', d:'#bf360c' },
  { m:'#2e7d32', d:'#1b5e20' },
  { m:'#7b1fa2', d:'#4a148c' },
  { m:'#c62828', d:'#b71c1c' },
  { m:'#00838f', d:'#006064' },
  { m:'#4e342e', d:'#3e2723' },
  { m:'#1565c0', d:'#0d47a1' },
  { m:'#ad1457', d:'#880e4f' },
  { m:'#558b2f', d:'#33691e' },
  { m:'#ef6c00', d:'#e65100' },
  { m:'#6a1b9a', d:'#4a148c' },
];

const WX = {
  0:'Clear',1:'Mostly Clear',2:'Partly Cloudy',3:'Overcast',45:'Fog',48:'Rime Fog',
  51:'Lt Drizzle',53:'Drizzle',55:'Hvy Drizzle',56:'Frz Drizzle',57:'Hvy Frz Drizzle',
  61:'Lt Rain',63:'Rain',65:'Hvy Rain',66:'Frz Rain',67:'Hvy Frz Rain',
  71:'Lt Snow',73:'Snow',75:'Hvy Snow',77:'Snow Grains',
  80:'Lt Showers',81:'Showers',82:'Hvy Showers',85:'Lt Snow Shwrs',86:'Hvy Snow Shwrs',
  95:'Thunderstorm',96:'T-Storm+Hail',99:'Hvy T-Storm+Hail'
};
function wxColor(c) {
  if (c<=0) return '#f57f17'; if (c<=3) return '#757575'; if (c<=48) return '#546e7a';
  if (c<=67) return '#0277bd'; if (c<=77) return '#455a64'; if (c<=82) return '#0277bd';
  return '#e65100';
}

// ─── State ───
let loc = JSON.parse(localStorage.getItem('wx-loc')) || { name:'Wilton, NH', lat:42.8406, lon:-71.7356 };
let period = 7;
let activeYears = new Set([THIS_YEAR]);
let yearData = {};
let cTemp=null, cPrecip=null, cHumid=null;
let geoTimer=null, refreshTimer=null;
const cache = {};

// ─── Init ───
document.getElementById('loc-name').textContent = loc.name;
renderYearBtns();
refresh();

// ─── API ───
function fmt(d) { return d.toISOString().split('T')[0]; }

function process(raw) {
  const dl = raw.daily;
  const hum = [];
  if (raw.hourly?.relative_humidity_2m) {
    const ht=raw.hourly.time, hh=raw.hourly.relative_humidity_2m, byD={};
    ht.forEach((t,i)=>{ const d=t.split('T')[0]; (byD[d]=byD[d]||[]).push(hh[i]); });
    dl.time.forEach(d=>{ const v=(byD[d]||[]).filter(x=>x!=null); hum.push(v.length?Math.round(v.reduce((a,b)=>a+b)/v.length):null); });
  }
  return {
    dates:dl.time, high:dl.temperature_2m_max, low:dl.temperature_2m_min,
    precip:dl.precipitation_sum, rain:dl.rain_sum,
    snow:dl.snowfall_sum?.map(v=>v!=null?+(v/2.54).toFixed(2):null),
    precipHrs:dl.precipitation_hours, wxCode:dl.weather_code, humidity:hum
  };
}

async function fetchWx(start, end) {
  const key = `${loc.lat},${loc.lon},${start},${end}`;
  if (cache[key]) return cache[key];
  const qs = new URLSearchParams({
    latitude:loc.lat, longitude:loc.lon, start_date:start, end_date:end,
    daily:DAILY, hourly:HOURLY, timezone:'auto',
    temperature_unit:'fahrenheit', precipitation_unit:'inch'
  }).toString();
  const endDaysAgo = Math.floor((NOW - new Date(end+'T12:00:00')) / 86400000);
  if (endDaysAgo < 7) {
    try {
      const r = await fetch(`${FORECAST}?${qs}`);
      if (r.ok) { const d=await r.json(); if(d.daily?.time?.length){ cache[key]=process(d); return cache[key]; } }
    } catch(_){}
  }
  const r = await fetch(`${ARCHIVE}?${qs}`);
  if (!r.ok) throw new Error('API error');
  const d = await r.json();
  if (!d.daily?.time?.length) throw new Error('No data');
  cache[key] = process(d);
  return cache[key];
}

// ─── Core refresh ───
async function refresh() {
  if (!activeYears.size) { hideResults(); return; }
  showLoading(true); hideError();
  const baseEnd = new Date(NOW); baseEnd.setDate(baseEnd.getDate()-1);
  const baseStart = new Date(baseEnd); baseStart.setDate(baseStart.getDate()-period+1);
  try {
    const sorted = [...activeYears].sort((a,b)=>b-a);
    const results = await Promise.all(sorted.map(yr => {
      const offset = THIS_YEAR - yr;
      const s = new Date(baseStart); s.setFullYear(s.getFullYear()-offset);
      const e = new Date(baseEnd);   e.setFullYear(e.getFullYear()-offset);
      return fetchWx(fmt(s), fmt(e)).then(data=>({yr,data}));
    }));
    yearData = {};
    results.forEach(r => yearData[r.yr] = r.data);
    renderAll();
    showLoading(false); showResults();
  } catch(e) {
    showLoading(false); showError(e.message);
  }
}
function scheduleRefresh() { clearTimeout(refreshTimer); refreshTimer = setTimeout(refresh, 150); }

// ─── Controls ───
function setPeriod(n) {
  period = n;
  document.querySelectorAll('.pbtn').forEach(b => b.classList.toggle('active', parseInt(b.textContent)===n));
  scheduleRefresh();
}
function toggleYear(yr) {
  if (activeYears.has(yr)) { if (activeYears.size > 1) activeYears.delete(yr); }
  else activeYears.add(yr);
  renderYearBtns();
  scheduleRefresh();
}
function renderYearBtns() {
  document.getElementById('years').innerHTML = '<span class="lbl">Years</span>' + YEARS.map((yr,i) => {
    const on = activeYears.has(yr);
    const ci = i % C.length;
    const style = on ? `background:${C[ci].m}12;color:${C[ci].m};border-color:${C[ci].m}` : '';
    return `<button class="ybtn${on?' active':''}" style="${style}" onclick="toggleYear(${yr})">${yr}</button>`;
  }).join('');
}

// Location
function toggleLoc() {
  const el=document.getElementById('loc-search'); el.classList.toggle('hidden');
  if(!el.classList.contains('hidden')) document.getElementById('loc-input').focus();
}
function debounceGeo() {
  clearTimeout(geoTimer);
  geoTimer = setTimeout(async()=>{
    const q=document.getElementById('loc-input').value.trim();
    if(q.length<2){document.getElementById('loc-results').innerHTML='';return;}
    const r=await fetch(`${GEOCODE}?name=${encodeURIComponent(q)}&count=5&language=en&format=json`);
    const d=await r.json(); window._gr=d.results||[];
    document.getElementById('loc-results').innerHTML=window._gr.map((r,i)=>
      `<div class="loc-item" onclick="pickLoc(${i})">${r.name}, ${r.admin1||''} ${r.country||''}</div>`
    ).join('');
  },300);
}
function pickLoc(i) {
  const r=window._gr[i];
  loc={name:`${r.name}, ${r.admin1||r.country||''}`.replace(/,\s*$/,''),lat:r.latitude,lon:r.longitude};
  localStorage.setItem('wx-loc',JSON.stringify(loc));
  document.getElementById('loc-name').textContent=loc.name;
  document.getElementById('loc-search').classList.add('hidden');
  document.getElementById('loc-results').innerHTML='';
  document.getElementById('loc-input').value='';
  Object.keys(cache).forEach(k=>delete cache[k]);
  refresh();
}

// ─── UI helpers ───
function showLoading(v){document.getElementById('loading').classList.toggle('hidden',!v);}
function showResults(){document.getElementById('results').classList.remove('hidden');}
function hideResults(){document.getElementById('results').classList.add('hidden');}
function showError(m){const e=document.getElementById('error');e.textContent=m;e.classList.remove('hidden');}
function hideError(){document.getElementById('error').classList.add('hidden');}

function formatDate(s){const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function shortDate(s){const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function avg(a){const v=a.filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b)/v.length:null;}
function sum(a){const v=a.filter(x=>x!=null);return v.length?v.reduce((a,b)=>a+b):null;}
function cntNZ(a){return a.filter(x=>x!=null&&x>0).length;}
function maxV(a){const v=a.filter(x=>x!=null);return v.length?Math.max(...v):null;}
function minV(a){const v=a.filter(x=>x!=null);return v.length?Math.min(...v):null;}
function frostCt(a){return a.filter(x=>x!=null&&x<=32).length;}
function fv(v,dec,u){return v!=null?(dec?v.toFixed(dec):Math.round(v))+u:'--';}

// ─── Render ───
function renderAll() {
  const sorted = [...activeYears].sort((a,b)=>b-a);
  renderSummary(sorted);
  renderCharts(sorted);
  renderTables(sorted);
}

function renderSummary(sorted) {
  const cols = [
    {t:'Avg High',k:'high',fn:avg,u:'\u00b0F',dec:1},
    {t:'Peak High',k:'high',fn:maxV,u:'\u00b0F',dec:1},
    {t:'Avg Low',k:'low',fn:avg,u:'\u00b0F',dec:1},
    {t:'Lowest Low',k:'low',fn:minV,u:'\u00b0F',dec:1},
    {t:'Days \u226432\u00b0',k:'low',fn:frostCt,u:'',dec:0},
    {t:'Precip',k:'precip',fn:sum,u:'"',dec:2},
    {t:'Rain Days',k:'rain',fn:cntNZ,u:'',dec:0},
    {t:'Snow Days',k:'snow',fn:cntNZ,u:'',dec:0},
    {t:'Humidity',k:'humidity',fn:avg,u:'%',dec:0},
  ];
  let h = '<table class="summary-tbl"><thead><tr><th>Year</th>';
  cols.forEach(c => h += `<th>${c.t}</th>`);
  h += '</tr></thead><tbody>';
  sorted.forEach(yr => {
    const d = yearData[yr]; if(!d) return;
    const ci = YEARS.indexOf(yr);
    h += `<tr><td><span class="yr-dot" style="background:${C[ci].m}"></span>${yr}</td>`;
    cols.forEach(c => {
      const v = c.fn(d[c.k]);
      const isTemp = c.u === '\u00b0F';
      const cls = isTemp && v != null && v <= 32 ? ' class="freeze"' : '';
      h += `<td${cls}>${fv(v,c.dec,c.u)}</td>`;
    });
    h += '</tr>';
  });
  h += '</tbody></table>';
  document.getElementById('summary').innerHTML = h;
}

// ─── Charts ───
function destroyCharts(){[cTemp,cPrecip,cHumid].forEach(c=>{if(c)c.destroy()});cTemp=cPrecip=cHumid=null;}

function xLabels() {
  const ref = yearData[Object.keys(yearData)[0]];
  if(!ref) return [];
  return ref.dates.map(d => shortDate(d));
}

function chartOpts(yLabel) {
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{labels:{color:'#333',boxWidth:10,font:{size:9,family:'Helvetica Neue, Arial'}}},
      tooltip:{backgroundColor:'#fff',titleColor:'#222',bodyColor:'#555',borderColor:'#ccc',borderWidth:1,
        titleFont:{family:'Helvetica Neue, Arial'},bodyFont:{family:'Helvetica Neue, Arial'}}
    },
    scales:{
      x:{ticks:{color:'#888',font:{size:8,family:'Helvetica Neue, Arial'},maxRotation:45},grid:{color:'#eee'}},
      y:{ticks:{color:'#888',font:{size:8,family:'Helvetica Neue, Arial'}},grid:{color:'#eee'},
         title:{display:!!yLabel,text:yLabel,color:'#888',font:{size:9,family:'Helvetica Neue, Arial'}}}
    }
  };
}

function renderCharts(sorted) {
  destroyCharts();
  const labels = xLabels();

  const tempDS = [{
    label:'32\u00b0F Freeze',data:labels.map(()=>32),
    borderColor:'#90caf9',borderWidth:1,borderDash:[6,4],
    pointRadius:0,fill:false,order:99
  }];
  sorted.forEach(yr => {
    const ci = YEARS.indexOf(yr); const d = yearData[yr]; if(!d) return;
    tempDS.push(
      {label:`${yr} High`,data:d.high,borderColor:C[ci].m,borderWidth:2,pointRadius:1.5,tension:0.3,fill:false},
      {label:`${yr} Low`, data:d.low, borderColor:C[ci].m+'88',borderWidth:1.5,pointRadius:1.5,tension:0.3,borderDash:[4,3],fill:false}
    );
  });
  cTemp = new Chart(document.getElementById('cTemp'),{type:'line',data:{labels,datasets:tempDS},options:chartOpts('\u00b0F')});

  const precipDS = sorted.map(yr => {
    const ci=YEARS.indexOf(yr); const d=yearData[yr]; if(!d) return null;
    return {label:`${yr}`,data:d.precip,backgroundColor:C[ci].m+'66',borderColor:C[ci].m,borderWidth:1,borderRadius:2};
  }).filter(Boolean);
  cPrecip = new Chart(document.getElementById('cPrecip'),{type:'bar',data:{labels,datasets:precipDS},options:chartOpts('inches')});

  const humDS = sorted.map(yr => {
    const ci=YEARS.indexOf(yr); const d=yearData[yr]; if(!d) return null;
    return {label:`${yr}`,data:d.humidity,borderColor:C[ci].m,borderWidth:2,pointRadius:1.5,tension:0.3,fill:false};
  }).filter(Boolean);
  const hOpts = chartOpts('%');
  hOpts.scales.y.min=0; hOpts.scales.y.max=100;
  cHumid = new Chart(document.getElementById('cHumid'),{type:'line',data:{labels,datasets:humDS},options:hOpts});
}

// ─── Tables ───
function renderTables(sorted) {
  document.getElementById('tables').innerHTML = sorted.map(yr => {
    const ci=YEARS.indexOf(yr); const d=yearData[yr]; if(!d) return '';
    const hasSnow = d.snow.some(v=>v!=null&&v>0);
    let h = `<div class="tbl-yr" style="color:${C[ci].m};border-left:3px solid ${C[ci].m}">${yr}</div>`;
    h += '<table class="daily"><thead><tr>';
    h += '<th>Date</th><th>Condition</th><th>Hi</th><th>Lo</th><th>Precip</th>';
    if(hasSnow) h+='<th>Snow</th>';
    h += '<th>Hum</th></tr></thead><tbody>';
    d.dates.forEach((_,i)=>{
      const wx=WX[d.wxCode[i]]||'--', wc=wxColor(d.wxCode[i]);
      h+=`<tr><td>${formatDate(d.dates[i])}</td>`;
      h+=`<td><span class="wx-tag" style="color:${wc}">${wx}</span></td>`;
      const hi=d.high[i], lo=d.low[i];
      h+=`<td class="num${hi!=null&&hi<=32?' freeze':''}">${hi!=null?hi.toFixed(1)+'\u00b0':'--'}</td>`;
      h+=`<td class="num${lo!=null&&lo<=32?' freeze':''}">${lo!=null?lo.toFixed(1)+'\u00b0':'--'}</td>`;
      h+=`<td class="num">${d.precip[i]!=null?d.precip[i].toFixed(2)+'"':'--'}</td>`;
      if(hasSnow) h+=`<td class="num">${d.snow[i]>0?d.snow[i].toFixed(1)+'"':'--'}</td>`;
      h+=`<td class="num">${d.humidity[i]!=null?d.humidity[i]+'%':'--'}</td></tr>`;
    });
    h+='</tbody></table>';
    return h;
  }).join('');
}
</script>
</body>
</html>
